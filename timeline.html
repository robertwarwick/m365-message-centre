<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M365 Roadmap Timeline</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ms-purple: #5c2d91;
    --ms-purple-light: #f3f0ff;
    --ms-text: #11100f;
    --ms-text-muted: #605e5c;
    --ms-border: #edebe9;
    --page-bg: #f3f2f1;
    --c-rolling: #7a4f00;
    --c-preview: #0078d4;
    --c-dev: #5c2d91;
  }
  body { font-family: 'Segoe UI', SegoeUI, Roboto, 'Helvetica Neue', Arial, sans-serif; background: var(--page-bg); color: var(--ms-text); font-size: 14px; line-height: 1.5; min-height: 100vh; }

  /* NAV */
  .topnav { background: #1a1a2e; display: flex; align-items: center; padding: 0 24px; }
  .topnav-brand { color: white; font-size: 13px; font-weight: 600; padding: 10px 16px 10px 0; margin-right: 8px; border-right: 1px solid rgba(255,255,255,0.15); white-space: nowrap; text-decoration: none; }
  .topnav a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 13px; padding: 10px 14px; display: inline-block; transition: color 0.15s; border-bottom: 2px solid transparent; }
  .topnav a:hover { color: white; }
  .topnav a.active { color: white; border-bottom-color: #a88bff; }

  /* HEADER */
  .header { background: var(--ms-purple); color: white; padding: 20px 24px 16px; }
  .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; }
  .header-sub { font-size: 13px; opacity: 0.85; }
  .btn-refresh { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: inherit; display: flex; align-items: center; gap: 6px; white-space: nowrap; flex-shrink: 0; transition: background 0.15s; }
  .btn-refresh:hover { background: rgba(255,255,255,0.25); }
  .btn-refresh:disabled { opacity: 0.6; cursor: not-allowed; }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* CONTROLS */
  .controls { background: white; border-bottom: 1px solid var(--ms-border); position: sticky; top: 0; z-index: 20; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .controls-inner { max-width: 1200px; margin: 0 auto; padding: 12px 24px; display: flex; flex-direction: column; gap: 10px; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 12px; color: var(--ms-text-muted); font-weight: 500; margin-right: 2px; }
  .range-select { padding: 4px 10px; border: 1px solid #c8c6c4; border-radius: 4px; font-size: 12px; font-family: inherit; background: white; cursor: pointer; outline: none; color: var(--ms-text); }
  .range-select:focus { border-color: var(--ms-purple); }
  .pill { padding: 5px 12px 4px; border-radius: 16px; border: 1px solid #c8c6c4; font-size: 12px; cursor: pointer; background: white; color: var(--ms-text); font-family: inherit; transition: all 0.15s; white-space: nowrap; display: inline-flex; flex-direction: column; align-items: center; gap: 1px; }
  .pill:hover { border-color: var(--ms-purple); color: var(--ms-purple); }
  .pill.active { background: var(--ms-purple); border-color: var(--ms-purple); color: white; }
  .pill.active:hover { background: #4b0082; }
  .pill-count { font-size: 10px; font-weight: 600; line-height: 1; opacity: 0.6; }
  .pill.active .pill-count { opacity: 0.85; }

  /* MAIN */
  .main { max-width: 1200px; margin: 0 auto; padding: 20px 24px 60px; }
  .error-msg { background: #fde7e9; border: 1px solid #f3c4c7; color: #c50f1f; padding: 12px 16px; border-radius: 4px; margin-bottom: 16px; font-size: 13px; }
  .state-msg { text-align: center; padding: 60px 24px; color: var(--ms-text-muted); }
  .state-msg h3 { font-size: 16px; margin: 12px 0 6px; color: var(--ms-text); }
  .state-msg p { font-size: 13px; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; font-size: 13px; color: var(--ms-text-muted); }
  .status-bar strong { color: var(--ms-text); }

  /* LEGEND */
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; background: white; padding: 10px 16px; border-radius: 6px; border: 1px solid var(--ms-border); font-size: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; color: var(--ms-text-muted); }
  .legend-swatch { width: 12px; height: 3px; border-radius: 2px; flex-shrink: 0; }

  /* TIMELINE OUTER */
  .tl-outer { background: white; border: 1px solid var(--ms-border); border-radius: 6px; overflow: hidden; }
  .tl-scroll { overflow-x: auto; }
  .tl-inner { min-width: 680px; }

  /* LANE */
  .tl-lane { display: grid; grid-template-columns: 160px 1fr; border-bottom: 1px solid var(--ms-border); }
  .tl-lane:last-child { border-bottom: none; }
  .tl-lane.focused { background: var(--ms-purple-light); }
  .tl-lane-label {
    border-right: 1px solid var(--ms-border);
    padding: 14px 12px 0;
    font-size: 12px;
    font-weight: 600;
    color: var(--ms-text);
    display: flex;
    align-items: flex-start;
    gap: 5px;
  }
  .tl-lane-track { position: relative; overflow: visible; }

  /* AXIS, GRID, TODAY — injected by JS */
  .tl-axis-line {
    position: absolute;
    left: 0; right: 0;
    bottom: 22px; /* = TICK_H */
    height: 1px;
    background: #b3b0ae;
    pointer-events: none;
  }
  .tl-grid-line {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: #f0eeec;
    pointer-events: none;
    z-index: 0;
  }
  .tl-tick {
    position: absolute;
    bottom: 2px;
    font-size: 10px;
    color: var(--ms-text-muted);
    transform: translateX(-50%);
    white-space: nowrap;
    pointer-events: none;
  }
  .tl-today-line {
    position: absolute;
    top: 0; bottom: 0;
    left: 0;
    width: 2px;
    background: rgba(196,67,67,0.45);
    pointer-events: none;
    z-index: 4;
  }
  .tl-today-label {
    position: absolute;
    top: 4px;
    left: 4px;
    font-size: 9px;
    font-weight: 600;
    color: rgba(180,50,50,0.8);
    white-space: nowrap;
  }
  .tl-axis-dot {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 2px solid white;
    bottom: 18px; /* TICK_H - 4 = 18, centered on axis */
    transform: translateX(-50%);
    z-index: 3;
    pointer-events: none;
  }
  .tl-axis-dot.s-rolling { background: var(--c-rolling); }
  .tl-axis-dot.s-preview { background: var(--c-preview); }
  .tl-axis-dot.s-dev     { background: var(--c-dev); }

  /* CARD ITEMS */
  .tl-item {
    position: absolute;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 152px;
    z-index: 2;
    /* bottom set inline: = TICK_H = 22px */
  }
  .tl-card {
    width: 152px;
    background: white;
    border: 1px solid var(--ms-border);
    border-radius: 5px;
    padding: 8px 10px 7px;
    text-decoration: none;
    color: var(--ms-text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    transition: box-shadow 0.12s, transform 0.12s;
    flex-shrink: 0;
  }
  .tl-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.16); transform: translateY(-2px); z-index: 10; }
  .tl-card.s-rolling { border-left: 3px solid var(--c-rolling); }
  .tl-card.s-preview { border-left: 3px solid var(--c-preview); }
  .tl-card.s-dev     { border-left: 3px solid var(--c-dev); }
  .tl-card-title {
    font-size: 11px;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 5px;
    color: var(--ms-text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .tl-card-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    color: white;
    margin-bottom: 4px;
  }
  .tl-card-badge.s-rolling { background: var(--c-rolling); }
  .tl-card-badge.s-preview { background: var(--c-preview); }
  .tl-card-badge.s-dev     { background: var(--c-dev); }
  .tl-card-date { font-size: 10px; color: var(--ms-text-muted); }

  /* Connector line from card bottom to axis */
  .tl-conn {
    width: 1px;
    background: #c8c6c4;
    flex-shrink: 0;
  }

  @media (max-width: 640px) {
    .header-inner { flex-direction: column; }
    .controls-inner, .main { padding-left: 12px; padding-right: 12px; }
  }
</style>
</head>
<body>

<nav class="topnav">
  <span class="topnav-brand">📋 M365 Updates</span>
  <a href="index.html">Message Centre</a>
  <a href="roadmap.html">Roadmap</a>
  <a href="timeline.html" class="active">Timeline</a>
</nav>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>🗓 Roadmap Timeline</h1>
      <div class="header-sub" id="headerSub">Loading roadmap data…</div>
    </div>
    <button class="btn-refresh" id="btnRefresh" onclick="loadData(true)">
      <span id="refreshIcon">↻</span> Refresh
    </button>
  </div>
</div>

<div class="controls">
  <div class="controls-inner">
    <div class="filter-row">
      <span class="filter-label">Horizon:</span>
      <select class="range-select" id="rangeSelect" onchange="renderAll()">
        <option value="90">Next 3 months</option>
        <option value="180">Next 6 months</option>
        <option value="365" selected>Next 12 months</option>
        <option value="0">All upcoming</option>
      </select>
    </div>
    <div class="filter-row">
      <span class="filter-label">Product:</span>
      <button class="pill active" data-product="All" onclick="setProduct('All')">All<span class="pill-count"></span></button>
      <button class="pill" data-product="Copilot" onclick="setProduct('Copilot')">Copilot<span class="pill-count"></span></button>
      <button class="pill" data-product="Copilot Studio" onclick="setProduct('Copilot Studio')">Copilot Studio<span class="pill-count"></span></button>
      <button class="pill" data-product="Power Platform" onclick="setProduct('Power Platform')">Power Platform<span class="pill-count"></span></button>
      <button class="pill" data-product="Power Apps" onclick="setProduct('Power Apps')">Power Apps<span class="pill-count"></span></button>
      <button class="pill" data-product="Power Automate" onclick="setProduct('Power Automate')">Power Automate<span class="pill-count"></span></button>
      <button class="pill" data-product="Dynamics 365 Sales" onclick="setProduct('Dynamics 365 Sales')">D365 Sales<span class="pill-count"></span></button>
      <button class="pill" data-product="Business Central" onclick="setProduct('Business Central')">Business Central<span class="pill-count"></span></button>
    </div>
  </div>
</div>

<div class="main">
  <div id="errorBanner" class="error-msg" style="display:none"></div>
  <div id="statusBar" class="status-bar" style="display:none"><span id="statusText"></span></div>
  <div id="content">
    <div class="state-msg">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#c8c6c4" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <h3>Loading…</h3>
      <p>Fetching roadmap from mc.merill.net</p>
    </div>
  </div>
</div>

<script>
// ── Layout constants (keep in sync with CSS) ──────────────────────
const TICK_H      = 22;   // px: height of tick-label area below axis line
const CONN_BASE   = 14;   // px: connector height for row 0
const CARD_H      = 80;   // px: estimated card height (for row-stacking maths)
const ROW_GAP     = 10;   // px: vertical gap between stacked card rows
const TOP_PAD     = 16;   // px: space above the topmost card row
const OVERLAP_PCT = 13;   // %: cards within this % are stacked into separate rows

const FORWARD_STATUSES = new Set(['In development', 'Preview', 'Rolling out']);

// ── Product config ────────────────────────────────────────────────
const PRODUCT_RULES = {
  'Copilot': s => { const l = s.toLowerCase(); return (l.includes('copilot') && !l.includes('copilot studio')) || l.includes('microsoft 365 copilot'); },
  'Copilot Studio':     s => s.toLowerCase().includes('copilot studio'),
  'Power Platform':     s => s.toLowerCase().includes('power platform'),
  'Power Apps':         s => s.toLowerCase().includes('power apps') || s.toLowerCase().includes('powerapps'),
  'Power Automate':     s => s.toLowerCase().includes('power automate'),
  'Dynamics 365 Sales': s => { const l = s.toLowerCase(); return l.includes('dynamics 365 sales') || l.includes('dynamics sales') || l.includes('copilot for sales'); },
  'Business Central':   s => s.toLowerCase().includes('business central'),
};
const PRODUCT_ICONS = {
  'Copilot':'🤖','Copilot Studio':'🧩','Power Platform':'⚡',
  'Power Apps':'📱','Power Automate':'🔄','Dynamics 365 Sales':'💼','Business Central':'📊',
};
// status → CSS class suffix
const STATUS_SC = { 'Rolling out':'s-rolling', 'Preview':'s-preview', 'In development':'s-dev' };
const STATUS_BADGE = { 'Rolling out':'↗ Rolling out', 'Preview':'◎ Preview', 'In development':'⚙ In development' };

let allItems    = [];
let activeProduct = 'All';
let lastFetchTime = null;

// ── Data loading ──────────────────────────────────────────────────
async function loadData(forceRefresh = false) {
  const btn = document.getElementById('btnRefresh');
  const icon = document.getElementById('refreshIcon');
  btn.disabled = true;
  icon.classList.add('spin');
  hideError();
  setContent(`<div class="state-msg">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#c8c6c4" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    <h3>Fetching roadmap…</h3><p>Loading from mc.merill.net</p>
  </div>`);
  try {
    const url = forceRefresh ? 'https://mc.merill.net/messages-index.json?t=' + Date.now()
                             : 'https://mc.merill.net/messages-index.json';
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allItems = Array.isArray(data) ? data : (data.items || data.messages || []);
    lastFetchTime = new Date();
    renderAll();
  } catch (e) {
    showError('Failed to load data: ' + e.message);
    setContent(`<div class="state-msg">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#c8c6c4" stroke-width="1.5"><path d="M9 9l6 6m0-6l-6 6"/><circle cx="12" cy="12" r="10"/></svg>
      <h3>Could not load data</h3><p>Check your connection and try refreshing.</p>
    </div>`);
  } finally {
    btn.disabled = false;
    icon.classList.remove('spin');
  }
}

// ── Main render ───────────────────────────────────────────────────
function renderAll() {
  const days    = parseInt(document.getElementById('rangeSelect').value);
  const today   = new Date(); today.setHours(0,0,0,0);
  const horizon = days > 0 ? new Date(today.getTime() + days * 86400000) : null;

  // RM items only, with products assigned and status computed
  let items = allItems
    .filter(i => i.Id && i.Id.startsWith('RM'))
    .map(i => ({ ...i, _products: getProducts(i), _status: getPrimaryStatus(i.Tags || []) }));

  // Forward-looking: only active/upcoming statuses
  items = items.filter(i => FORWARD_STATUSES.has(i._status));

  // Horizon filter: keep items whose StartDateTime falls before the horizon
  if (horizon) {
    items = items.filter(i => {
      if (!i.StartDateTime) return false;
      return new Date(i.StartDateTime) <= horizon;
    });
  }

  // Must match at least one tracked product
  items = items.filter(i => i._products.length > 0);

  // Update pill counts before applying product filter
  updatePillCounts(items);

  if (activeProduct !== 'All') {
    items = items.filter(i => i._products.includes(activeProduct));
  }

  updateStatusBar(items.length);

  if (!items.length) {
    const rangeLabel = document.getElementById('rangeSelect').selectedOptions[0].text;
    setContent(`<div class="state-msg">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#c8c6c4" stroke-width="1.5"><path d="M9 9l6 6m0-6l-6 6"/><circle cx="12" cy="12" r="10"/></svg>
      <h3>No upcoming items found</h3>
      <p>No roadmap entries for ${rangeLabel}. Try widening the horizon or selecting a different product.</p>
    </div>`);
    return;
  }

  // Time axis: today → latest item date (+ 4% padding)
  const futureDates = items
    .map(i => i.StartDateTime ? new Date(i.StartDateTime) : null)
    .filter(d => d && d >= today);

  let tMax = futureDates.length
    ? new Date(Math.max(...futureDates))
    : new Date(today.getTime() + 86400000 * 90);
  const span = tMax - today || 86400000 * 30;
  tMax = new Date(tMax.getTime() + span * 0.06);

  renderTimeline(items, today, tMax);

  const rangeLabel = document.getElementById('rangeSelect').selectedOptions[0].text;
  document.getElementById('headerSub').textContent =
    `${items.length} upcoming item${items.length !== 1 ? 's' : ''} · ${rangeLabel} · ${Object.keys(PRODUCT_RULES).length} tracked products`;
}

// ── Timeline renderer ─────────────────────────────────────────────
function renderTimeline(items, tMin, tMax) {
  const totalMs = tMax - tMin;
  const ticks   = makeTicks(tMin, tMax, totalMs);

  const products = activeProduct === 'All' ? Object.keys(PRODUCT_RULES) : [activeProduct];
  const lanes = products
    .map(p => ({ product: p, items: items.filter(i => i._products.includes(p)) }))
    .filter(l => l.items.length > 0);

  if (!lanes.length) {
    setContent(`<div class="state-msg"><h3>No items to display</h3></div>`);
    return;
  }

  const lanesHtml = lanes.map(({ product, items: li }) => buildLane(product, li, tMin, totalMs)).join('');

  const LEGEND_ITEMS = [
    ['var(--c-rolling)', '↗ Rolling out'],
    ['var(--c-preview)', '◎ Preview'],
    ['var(--c-dev)',     '⚙ In development'],
  ];

  setContent(`
    <div class="legend">
      <span class="filter-label">Status:</span>
      ${LEGEND_ITEMS.map(([c,l]) =>
        `<span class="legend-item"><span class="legend-swatch" style="background:${c}"></span>${l}</span>`
      ).join('')}
      <span class="legend-item" style="margin-left:6px">
        <span style="display:inline-block;width:2px;height:12px;background:rgba(196,67,67,0.5);vertical-align:middle;margin-right:4px"></span>Today
      </span>
    </div>
    <div class="tl-outer">
      <div class="tl-scroll">
        <div class="tl-inner">${lanesHtml}</div>
      </div>
    </div>`);

  // Inject axis lines, grid lines, tick labels, today marker and axis dots after render
  requestAnimationFrame(() => {
    document.querySelectorAll('.tl-lane-track').forEach((track, idx) => {
      // Horizontal axis line
      const axLine = document.createElement('div');
      axLine.className = 'tl-axis-line';
      track.appendChild(axLine);

      // Vertical grid lines + tick labels
      ticks.forEach(t => {
        const gl = document.createElement('div');
        gl.className = 'tl-grid-line';
        gl.style.left = t.pct.toFixed(2) + '%';
        track.appendChild(gl);

        const tl = document.createElement('span');
        tl.className = 'tl-tick';
        tl.style.left = t.pct.toFixed(2) + '%';
        tl.textContent = t.label;
        track.appendChild(tl);
      });

      // Today marker (left edge = today)
      const todayEl = document.createElement('div');
      todayEl.className = 'tl-today-line';
      if (idx === 0) {
        const lbl = document.createElement('div');
        lbl.className = 'tl-today-label';
        lbl.textContent = 'Today';
        todayEl.appendChild(lbl);
      }
      track.appendChild(todayEl);

      // Colored axis dot for each item
      track.querySelectorAll('.tl-item[data-x][data-sc]').forEach(itemEl => {
        const dot = document.createElement('div');
        dot.className = 'tl-axis-dot ' + itemEl.dataset.sc;
        dot.style.left = itemEl.dataset.x + '%';
        track.appendChild(dot);
      });
    });
  });
}

// ── Lane builder ──────────────────────────────────────────────────
function buildLane(product, items, tMin, totalMs) {
  const icon     = PRODUCT_ICONS[product] || '📌';
  const isFocused = activeProduct === product;
  const today    = tMin; // tMin = today

  // Compute x position for each item; clamp past items to left edge
  const positioned = items.map(item => {
    const d   = item.StartDateTime ? new Date(item.StartDateTime) : today;
    const raw = (d - tMin) / totalMs * 100;
    const x   = Math.max(0.5, Math.min(99.5, raw));
    return { item, x, sc: STATUS_SC[item._status] || 's-dev' };
  }).sort((a, b) => a.x - b.x);

  // Greedy row assignment to avoid card overlap
  const rowEnds = [];
  for (const p of positioned) {
    let row = 0;
    while (rowEnds[row] !== undefined && p.x - rowEnds[row] < OVERLAP_PCT) row++;
    rowEnds[row] = p.x;
    p.row = row;
  }

  const maxRow  = Math.max(0, ...positioned.map(p => p.row));
  const trackH  = TICK_H + CONN_BASE + maxRow * (CARD_H + ROW_GAP) + CARD_H + TOP_PAD;

  const itemsHtml = positioned.map(({ item, x, sc, row }) => {
    const connH = CONN_BASE + row * (CARD_H + ROW_GAP);
    const id    = item.Id || '';
    const title = item.Title || 'Untitled';
    const date  = formatDate(item.StartDateTime);
    const url   = item.Url || `https://mc.merill.net/message/${id}`;
    const badge = STATUS_BADGE[item._status] || item._status;

    return `<div class="tl-item" style="left:${x.toFixed(2)}%;bottom:${TICK_H}px"
         data-x="${x.toFixed(2)}" data-sc="${sc}">
      <a class="tl-card ${sc}" href="${esc(url)}" target="_blank">
        <div class="tl-card-title">${esc(title)}</div>
        <span class="tl-card-badge ${sc}">${badge}</span>
        ${date ? `<div class="tl-card-date">📅 ${esc(date)}</div>` : ''}
      </a>
      <div class="tl-conn" style="height:${connH}px"></div>
    </div>`;
  }).join('');

  return `<div class="tl-lane${isFocused ? ' focused' : ''}">
    <div class="tl-lane-label">${icon} ${esc(product)}</div>
    <div class="tl-lane-track" style="height:${trackH}px">${itemsHtml}</div>
  </div>`;
}

// ── Tick generator ────────────────────────────────────────────────
function makeTicks(tMin, tMax, totalMs) {
  const days        = totalMs / 86400000;
  const isQuarterly = days > 400;
  const fmt         = { month: 'short', year: '2-digit' };
  const ticks       = [];

  const d = new Date(tMin);
  d.setDate(1);
  d.setHours(0, 0, 0, 0);
  if (d < tMin) d.setMonth(d.getMonth() + 1);

  while (d <= tMax) {
    if (!isQuarterly || d.getMonth() % 3 === 0) {
      const pct = (d - tMin) / totalMs * 100;
      if (pct >= 0 && pct <= 100) ticks.push({ pct, label: d.toLocaleDateString('en-GB', fmt) });
    }
    d.setMonth(d.getMonth() + 1);
  }
  return ticks;
}

// ── Helpers ───────────────────────────────────────────────────────
function getPrimaryStatus(tags) {
  for (const s of ['Rolling out', 'Preview', 'In development', 'Launched', 'Cancelled'])
    if (tags.includes(s)) return s;
  return 'Unknown';
}

function getProducts(item) {
  const combined = [...(item.Services || []), item.Title || '', item.Summary || ''];
  return Object.entries(PRODUCT_RULES).filter(([, fn]) => combined.some(s => fn(s))).map(([p]) => p);
}

function updatePillCounts(items) {
  document.querySelectorAll('.pill[data-product]').forEach(pill => {
    const countEl = pill.querySelector('.pill-count');
    if (!countEl) return;
    const p = pill.dataset.product;
    countEl.textContent = p === 'All' ? items.length : items.filter(i => i._products.includes(p)).length;
  });
}

function setProduct(p) {
  activeProduct = p;
  document.querySelectorAll('.pill[data-product]').forEach(el => el.classList.toggle('active', el.dataset.product === p));
  renderAll();
}

function updateStatusBar(count) {
  document.getElementById('statusBar').style.display = 'flex';
  const rangeLabel = document.getElementById('rangeSelect').selectedOptions[0].text;
  document.getElementById('statusText').innerHTML =
    `Showing <strong>${count}</strong> upcoming item${count !== 1 ? 's' : ''}` +
    (activeProduct !== 'All' ? ` for <strong>${activeProduct}</strong>` : '') +
    ` · ${rangeLabel}`;
}

function setContent(html) { document.getElementById('content').innerHTML = html; }
function showError(msg)    { const el = document.getElementById('errorBanner'); el.innerHTML = '⚠ ' + msg; el.style.display = 'block'; }
function hideError()       { document.getElementById('errorBanner').style.display = 'none'; }

function formatDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
  catch { return iso.split('T')[0]; }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

loadData();
